# Helm values for OpenChoreo Control Plane in quick-start container
# This file contains overrides for running the control plane in the quick-start k3d environment

# Enable cluster gateway for agent-based data plane communication
clusterGateway:
  enabled: true

# Enable cluster gateway integration in controller manager
# Allows controllers to communicate with data/build planes via cluster gateway
controllerManager:
  clusterGateway:
    enabled: true

openchoreoApi:
  ingress:
    enabled: true
    hosts:
      - host: api.openchoreo.localhost
        paths:
          - path: /
            pathType: Prefix

backstage:
  ingress:
    enabled: true
    hosts:
      - host: openchoreo.localhost
        paths:
          - path: /
            pathType: Prefix
  baseUrl: http://openchoreo.localhost:8080
  auth:
    authorizationUrl: http://thunder.openchoreo.localhost:8080/oauth2/authorize

asgardeoThunder:
  ingress:
    enabled: true
    hosts:
      - host: thunder.openchoreo.localhost
        paths:
          - path: /
            pathType: Prefix
            port: 8090
