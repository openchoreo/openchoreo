{{- if .Values.security.authz.enabled }}
{{- if or .Values.openchoreoApi.config.security.authorization.bootstrap.roles .Values.openchoreoApi.config.security.authorization.bootstrap.mappings }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openchoreo-control-plane.name" . }}-wait-job
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openchoreo-control-plane.name" . }}-wait-job
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openchoreo-control-plane.name" . }}-wait-job
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openchoreo-control-plane.name" . }}-wait-job
subjects:
  - kind: ServiceAccount
    name: {{ include "openchoreo-control-plane.name" . }}-wait-job
    namespace: {{ .Release.Namespace }}
---
# Post-install Job that waits for the controller-manager rollout to complete,
# ensuring the validating webhook is ready before Helm applies bootstrap authz
# resources (hook-weight "5"). Fixes the race condition described in #3524.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openchoreo-control-plane.name" . }}-wait-for-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "openchoreo-control-plane.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "openchoreo-control-plane.name" . }}-wait-job
      containers:
        - name: wait
          image: {{ .Values.waitJob.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - sh
            - -ec
            - |
              kubectl rollout status deployment/{{ .Values.controllerManager.name }} \
                --namespace {{ .Release.Namespace }} \
                --timeout=120s
{{- end }}
{{- end }}
