{{- if and .Values.backstage.enabled .Values.backstage.http.enabled .Values.gateway.enabled .Values.backstage.http.hostnames -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "openchoreo-control-plane.backstage.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: backstage
  {{- with .Values.backstage.http.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: gateway-default
      namespace: {{ .Release.Namespace }}
  {{- with .Values.backstage.http.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/openchoreo-observability-backend/chat
        - path:
            type: PathPrefix
            value: /api/openchoreo-portal-assistant-backend/api/v1alpha1/portal-assistant/chat
      timeouts:
        request: "450s"
        backendRequest: "450s"
      backendRefs:
        - name: {{ include "openchoreo-control-plane.backstage.name" $ }}
          port: {{ .Values.backstage.service.port }}
    - name: wirelogs
      matches:
        - path:
            type: PathPrefix
            value: /api/openchoreo/wirelogs/stream
      timeouts:
        backendRequest: "0s"
      backendRefs:
        - name: {{ include "openchoreo-control-plane.backstage.name" $ }}
          port: {{ .Values.backstage.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      {{- if .Values.backstage.http.sessionPersistence.enabled }}
      # Pin each browser to one Backstage replica so the two-request exec
      # handshake (POST /exec/init then WS /exec/ws) lands on the same pod when
      # the Deployment is scaled out (the exec session is held in-process).
      sessionPersistence:
        type: Cookie
        sessionName: {{ .Values.backstage.http.sessionPersistence.sessionName | quote }}
        cookieConfig:
          lifetimeType: Session
      {{- end }}
      backendRefs:
        - name: {{ include "openchoreo-control-plane.backstage.name" . }}
          port: {{ .Values.backstage.service.port }}
{{- end }}
