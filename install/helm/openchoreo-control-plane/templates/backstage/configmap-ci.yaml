{{- if .Values.backstage.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openchoreo-control-plane.backstage.name" . }}-ci-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: backstage
data:
  app-config.ci.yaml: |
    # External CI Platform Configuration
    # This file is auto-generated by Helm. CI providers (Jenkins, GitHub Actions)
    # are activated by setting the corresponding `backstage.externalCI.<provider>.enabled`
    # value to true and by populating the matching keys in the Secret referenced
    # by `backstage.secretName`.
    # Jenkins: requires the `jenkins.io/job-full-name` annotation on the Component.
    jenkins:
      baseUrl: ${JENKINS_BASE_URL}
      username: ${JENKINS_USERNAME}
      apiKey: ${JENKINS_API_KEY}
{{- if .Values.backstage.externalCI.githubActions.enabled }}
    # GitHub Actions: requires the `github.com/project-slug` annotation on the Component.
    # See https://backstage.io/docs/integrations/github/locations for the Backstage GitHub
    # integration. For GitHub Enterprise Server, set both GITHUB_HOST and GITHUB_API_BASE_URL.
    integrations:
      github:
        - host: ${GITHUB_HOST}
          {{- if .Values.backstage.externalCI.githubActions.apiBaseUrl }}
          apiBaseUrl: ${GITHUB_API_BASE_URL}
          {{- end }}
          token: ${GITHUB_TOKEN}
{{- end }}
{{- end }}
