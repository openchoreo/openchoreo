{{- if .Values.eventsCollector.enabled }}
{{- if .Values.eventsCollector.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openchoreo-observability-plane.eventsCollector.name" . }}-{{ .Release.Namespace }}
  labels:
    {{- include "openchoreo-observability-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: events-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openchoreo-observability-plane.eventsCollector.name" . }}-{{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "openchoreo-observability-plane.eventsCollector.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
