apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: react-starter-from-source
spec:
  owner:
    projectName: default

  # References the ComponentType
  componentType:
    kind: ComponentType
    name: deployment/web-application

  autoDeploy: true

  # Workflow configuration
  workflow:
    # Reference to Workflow
    name: paketo-buildpacks-builder

    # Parameters required by the Workflow
    parameters:
      repository:
        url: "https://github.com/openchoreo/sample-workloads"
        revision:
          branch: "main"
          # Optional commit hash, should be a valid git commit
          # commit: ""
        appPath: "/webapp-react-nginx"
      buildEnv:
        - name: BP_NODE_RUN_SCRIPTS
          value: "build"
        - name: BP_WEB_SERVER
          value: "nginx"
        - name: BP_WEB_SERVER_ROOT
          value: "build"
        - name: BP_WEB_SERVER_ENABLE_PUSH_STATE
          value: "true"

---
apiVersion: openchoreo.dev/v1alpha1
kind: WorkflowRun
metadata:
  name: react-starter-build-02
  labels:
    openchoreo.dev/project: "default"
    openchoreo.dev/component: "react-starter-from-source"
spec:
  workflow:
    # Reference to Workflow
    name: paketo-buildpacks-builder

    # Parameters required by the Workflow
    parameters:
      repository:
        url: "https://github.com/openchoreo/sample-workloads"
        revision:
          branch: "main"
          # Optional commit hash, should be a valid git commit
          # commit: ""
        appPath: "/webapp-react-nginx"
      buildEnv:
        - name: BP_NODE_RUN_SCRIPTS
          value: "build"
        - name: BP_WEB_SERVER
          value: "nginx"
        - name: BP_WEB_SERVER_ROOT
          value: "build"
        - name: BP_WEB_SERVER_ENABLE_PUSH_STATE
          value: "true"
