            WORKDIR="/mnt/vol/source"
            IMAGE="${IMAGE_NAME}:${IMAGE_TAG}-${GIT_REVISION}"

            # --- Parameter Validation ---
            echo ">> Image: $IMAGE"
            echo ">> Dockerfile: $DOCKERFILE_PATH"
            echo ">> Docker context: $DOCKER_CONTEXT"

            if [ ! -f "$WORKDIR/$DOCKERFILE_PATH" ]; then
              echo ">> Error: Dockerfile not found at: '$DOCKERFILE_PATH'"
              echo ">> Hint: Verify that the Dockerfile path is correct and relative to the repository root."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            if [ ! -d "$WORKDIR/$DOCKER_CONTEXT" ]; then
              echo ">> Error: Docker build context directory not found: '$DOCKER_CONTEXT'"
              echo ">> Hint: Verify that the Docker build context points to a valid directory relative to the repository root."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /etc/containers
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/run/containers/storage"
            graphroot = "/var/lib/containers/storage"
            [storage.options.overlay]
            mount_program = "/usr/bin/fuse-overlayfs"
            EOF

            # Build --env and --build-arg flags as argv entries, not shell fragments.
            # Base64 keeps embedded newlines within a single argv entry.
            set --
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              encoded_env_entries=$(printf '%s' "$BUILD_ENV_JSON" |
                jq -r '.[] | "\(.name)=\(.value)" | @base64')
              while IFS= read -r encoded_kv; do
                [ -n "$encoded_kv" ] || continue
                kv_with_sentinel=$(
                  printf '%s' "$encoded_kv" | base64 -d
                  printf '.'
