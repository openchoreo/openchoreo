apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: containerfile-build
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
          - name: build-env
          - name: build-args
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: moby/buildkit:v0.30.0
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR="/mnt/vol/source"
            IMAGE_NAME="{{workflow.parameters.image-name}}"
            IMAGE="${IMAGE_NAME}:{{workflow.parameters.image-tag}}-{{inputs.parameters.git-revision}}"
            DOCKER_CONTEXT="{{workflow.parameters.docker-context}}"
            DOCKERFILE_PATH="{{workflow.parameters.dockerfile-path}}"
            BUILD_ENV_JSON='{{inputs.parameters.build-env}}'
            BUILD_ARGS_JSON='{{inputs.parameters.build-args}}'

            echo ">> Image: $IMAGE"
            echo ">> Dockerfile: $DOCKERFILE_PATH"
            echo ">> Docker context: $DOCKER_CONTEXT"

            if [ ! -f "$WORKDIR/$DOCKERFILE_PATH" ]; then
              echo ">> Error: Dockerfile not found at: '$DOCKERFILE_PATH'"
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            if [ ! -d "$WORKDIR/$DOCKER_CONTEXT" ]; then
              echo ">> Error: Docker build context directory not found: '$DOCKER_CONTEXT'"
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            apk add --no-cache jq > /dev/null 2>&1 || true

            set --
            # build-env: environment variables available during build (passed as build-args to BuildKit)
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              eval "$(echo "$BUILD_ENV_JSON" | jq -r '.[] | @sh "set -- \"$@\" --opt \"build-arg:\(.name)=\(.value)\""')"
            fi

            # build-args: explicit Docker build arguments (ARG in Dockerfile)
            if [ -n "$BUILD_ARGS_JSON" ] && [ "$BUILD_ARGS_JSON" != "[]" ]; then
              eval "$(echo "$BUILD_ARGS_JSON" | jq -r '.[] | @sh "set -- \"$@\" --opt \"build-arg:\(.name)=\(.value)\""')"
            fi

            DOCKERFILE_DIR=$(dirname "$WORKDIR/$DOCKERFILE_PATH")
            DOCKERFILE_NAME=$(basename "$DOCKERFILE_PATH")

            echo ">> Building image with BuildKit"
            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context="$WORKDIR/$DOCKER_CONTEXT" \
              --local dockerfile="$DOCKERFILE_DIR" \
              --opt filename="$DOCKERFILE_NAME" \
              "$@" \
              --output "type=docker,name=$IMAGE,dest=/mnt/vol/app-image.tar"

            echo ">> Image built successfully"
        env:
          - name: BUILDKITD_FLAGS
            value: "--root=/storage"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
