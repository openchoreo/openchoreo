apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: containerfile-build
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
          - name: build-env
          - name: build-args
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.2
        env:
          - name: IMAGE_NAME
            value: '{{workflow.parameters.image-name}}'
          - name: IMAGE_TAG
            value: '{{workflow.parameters.image-tag}}'
          - name: GIT_REVISION
            value: '{{inputs.parameters.git-revision}}'
          - name: DOCKER_CONTEXT
            value: '{{workflow.parameters.docker-context}}'
          - name: DOCKERFILE_PATH
            value: '{{workflow.parameters.dockerfile-path}}'
          - name: BUILD_ENV_JSON
            value: '{{inputs.parameters.build-env}}'
          - name: BUILD_ARGS_JSON
            value: '{{inputs.parameters.build-args}}'
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR="/mnt/vol/source"
            IMAGE="${IMAGE_NAME}:${IMAGE_TAG}-${GIT_REVISION}"

            # --- Parameter Validation ---
            echo ">> Image: $IMAGE"
            echo ">> Dockerfile: $DOCKERFILE_PATH"
            echo ">> Docker context: $DOCKER_CONTEXT"

            if [ ! -f "$WORKDIR/$DOCKERFILE_PATH" ]; then
              echo ">> Error: Dockerfile not found at: '$DOCKERFILE_PATH'"
              echo ">> Hint: Verify that the Dockerfile path is correct and relative to the repository root."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            if [ ! -d "$WORKDIR/$DOCKER_CONTEXT" ]; then
              echo ">> Error: Docker build context directory not found: '$DOCKER_CONTEXT'"
              echo ">> Hint: Verify that the Docker build context points to a valid directory relative to the repository root."
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            mkdir -p /etc/containers
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/run/containers/storage"
            graphroot = "/var/lib/containers/storage"
            [storage.options.overlay]
            mount_program = "/usr/bin/fuse-overlayfs"
            EOF

            # Build --env and --build-arg flags as argv entries, not shell fragments.
            # Base64 keeps embedded newlines within a single argv entry.
            set --
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              encoded_env_entries=$(printf '%s' "$BUILD_ENV_JSON" |
                jq -r '.[] | "\(.name)=\(.value)" | @base64')
              while IFS= read -r encoded_kv; do
                [ -n "$encoded_kv" ] || continue
                kv_with_sentinel=$(
                  printf '%s' "$encoded_kv" | base64 -d
                  printf '.'
                )
                kv=${kv_with_sentinel%?}
                set -- "$@" --env "$kv"
              done <<EOF
            $encoded_env_entries
            EOF
            fi

            if [ -n "$BUILD_ARGS_JSON" ] && [ "$BUILD_ARGS_JSON" != "[]" ]; then
              encoded_build_arg_entries=$(printf '%s' "$BUILD_ARGS_JSON" |
                jq -r '.[] | "\(.name)=\(.value)" | @base64')
              while IFS= read -r encoded_kv; do
                [ -n "$encoded_kv" ] || continue
                kv_with_sentinel=$(
                  printf '%s' "$encoded_kv" | base64 -d
                  printf '.'
                )
                kv=${kv_with_sentinel%?}
                set -- "$@" --build-arg "$kv"
              done <<EOF
            $encoded_build_arg_entries
            EOF
            fi

            echo ">> Building image"
            podman build -t "$IMAGE" -f "$WORKDIR/$DOCKERFILE_PATH" "$@" -- "$WORKDIR/$DOCKER_CONTEXT"
            echo ">> Image built successfully"
            echo ">> Saving image"
            podman save -o /mnt/vol/app-image.tar "$IMAGE"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
