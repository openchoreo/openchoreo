# Rootless Dockerfile/Containerfile build using Buildah.
#
# Replaces containerfile-build.yaml (podman build + privileged: true).
# Buildah runs as UID 1000 with overlay storage driver in a user namespace.
#
# hostUsers: false (K8s 1.33+) maps container UIDs to unprivileged host UIDs,
# enabling overlay storage without FUSE or elevated capabilities.
#
# Prerequisites:
#   - Kubernetes 1.33+ with UserNamespacesSupport (GA, enabled by default)
#   - containerd 2.x as container runtime
#
# Output: docker-archive tarball at /mnt/vol/app-image.tar
# (compatible with the rootless-publish/publish-image-k3d.yaml template)
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: containerfile-build-buildah
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
          - name: build-env
          - name: build-args
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: quay.io/buildah/stable:v1.43.0
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR="/mnt/vol/source"
            IMAGE="{{workflow.parameters.image-name}}:{{workflow.parameters.image-tag}}-{{inputs.parameters.git-revision}}"
            DOCKER_CONTEXT="{{workflow.parameters.docker-context}}"
            DOCKERFILE_PATH="{{workflow.parameters.dockerfile-path}}"
            BUILD_ENV_JSON='{{inputs.parameters.build-env}}'
            BUILD_ARGS_JSON='{{inputs.parameters.build-args}}'

            echo ">> [buildah] Image: $IMAGE"
            echo ">> Dockerfile: $DOCKERFILE_PATH"
            echo ">> Docker context: $DOCKER_CONTEXT"

            if [ ! -f "$WORKDIR/$DOCKERFILE_PATH" ]; then
              echo ">> Error: Dockerfile not found at: '$DOCKERFILE_PATH'"
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            if [ ! -d "$WORKDIR/$DOCKER_CONTEXT" ]; then
              echo ">> Error: Docker build context directory not found: '$DOCKER_CONTEXT'"
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            # --- Storage configuration (overlay via user namespaces) ---
            mkdir -p /storage/run /storage/graph
            cat > /tmp/storage.conf <<'STORAGEEOF'
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            rootless_storage_path = "/storage/graph"
            [storage.options]
            pull_options = {enable_partial_images = "true", use_hard_links = "false", ostree_repos=""}
            [storage.options.overlay]
            STORAGEEOF

            export CONTAINERS_STORAGE_CONF=/tmp/storage.conf

            # Install jq for JSON parsing (Fedora-based image)
            dnf install -y --setopt=install_weak_deps=False jq > /dev/null 2>&1 || true

            # Build --env flags
            ENV_ARGS=""
            if [ -n "$BUILD_ENV_JSON" ] && [ "$BUILD_ENV_JSON" != "[]" ]; then
              ENV_ARGS=$(echo "$BUILD_ENV_JSON" | \
                jq -r '.[] | "--env \(.name)=\(.value)"' | \
                tr '\n' ' ')
            fi

            # Build --build-arg flags
            BUILD_ARG_FLAGS=""
            if [ -n "$BUILD_ARGS_JSON" ] && [ "$BUILD_ARGS_JSON" != "[]" ]; then
              BUILD_ARG_FLAGS=$(echo "$BUILD_ARGS_JSON" | \
                jq -r '.[] | "--build-arg \(.name)=\(.value)"' | \
                tr '\n' ' ')
            fi

            echo ">> Building image with Buildah (overlay driver, user namespace)"
            buildah build \
              --isolation chroot \
              -t "$IMAGE" \
              -f "$WORKDIR/$DOCKERFILE_PATH" \
              $ENV_ARGS \
              $BUILD_ARG_FLAGS \
              "$WORKDIR/$DOCKER_CONTEXT"

            echo ">> Image built successfully"
            echo ">> Saving image as docker-archive tarball"
            buildah push "$IMAGE" "docker-archive:/mnt/vol/app-image.tar:$IMAGE"
            echo ">> Image saved to /mnt/vol/app-image.tar"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
