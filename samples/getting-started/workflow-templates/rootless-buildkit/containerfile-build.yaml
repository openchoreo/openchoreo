# Rootful Dockerfile/Containerfile build using BuildKit in a user namespace.
#
# Replaces containerfile-build.yaml (podman build + privileged: true).
# Uses buildctl-daemonless.sh which starts buildkitd, runs the build, and exits.
#
# BuildKit advantages: parallel multi-stage builds, superior layer caching.
#
# hostUsers: false (K8s 1.33+) maps container UID 0 to an unprivileged host UID.
# privileged: true inside the user namespace grants full capabilities within it
# but NOT on the host — this is safe and avoids the rootless buildkit limitations
# (rootlesskit conflicts with K8s user namespaces, needs --oci-worker-no-process-sandbox).
#
# Prerequisites:
#   - Kubernetes 1.33+ with UserNamespacesSupport (GA, enabled by default)
#   - containerd 2.x as container runtime
#
# Output: docker-format tarball at /mnt/vol/app-image.tar
# (compatible with the rootless-publish/publish-image-k3d.yaml template)
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: containerfile-build-buildkit
spec:
  templates:
    - name: build-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
          - name: build-env
          - name: build-args
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: moby/buildkit:v0.29.0
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR="/mnt/vol/source"
            IMAGE="{{workflow.parameters.image-name}}:{{workflow.parameters.image-tag}}-{{inputs.parameters.git-revision}}"
            DOCKER_CONTEXT="{{workflow.parameters.docker-context}}"
            DOCKERFILE_PATH="{{workflow.parameters.dockerfile-path}}"
            BUILD_ARGS_JSON='{{inputs.parameters.build-args}}'

            echo ">> [buildkit] Image: $IMAGE"
            echo ">> Dockerfile: $DOCKERFILE_PATH"
            echo ">> Docker context: $DOCKER_CONTEXT"

            if [ ! -f "$WORKDIR/$DOCKERFILE_PATH" ]; then
              echo ">> Error: Dockerfile not found at: '$DOCKERFILE_PATH'"
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            if [ ! -d "$WORKDIR/$DOCKER_CONTEXT" ]; then
              echo ">> Error: Docker build context directory not found: '$DOCKER_CONTEXT'"
              echo ">> Repository contents:"
              ls -la "$WORKDIR/"
              exit 1
            fi

            # Build --opt build-arg flags for buildctl
            BUILD_ARG_OPTS=""
            if [ -n "$BUILD_ARGS_JSON" ] && [ "$BUILD_ARGS_JSON" != "[]" ]; then
              apk add --no-cache jq > /dev/null 2>&1 || true
              BUILD_ARG_OPTS=$(echo "$BUILD_ARGS_JSON" | \
                jq -r '.[] | "--opt build-arg:\(.name)=\(.value)"' | \
                tr '\n' ' ')
            fi

            # Resolve Dockerfile directory and filename for buildctl.
            # buildctl --local dockerfile=<dir> + --opt filename=<basename>
            DOCKERFILE_DIR=$(dirname "$WORKDIR/$DOCKERFILE_PATH")
            DOCKERFILE_NAME=$(basename "$DOCKERFILE_PATH")

            echo ">> Building image with BuildKit (rootful, user namespace)"
            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context="$WORKDIR/$DOCKER_CONTEXT" \
              --local dockerfile="$DOCKERFILE_DIR" \
              --opt filename="$DOCKERFILE_NAME" \
              $BUILD_ARG_OPTS \
              --output "type=docker,name=$IMAGE,dest=/mnt/vol/app-image.tar"

            echo ">> Image built successfully"
            echo ">> Image saved to /mnt/vol/app-image.tar"
        env:
          - name: BUILDKITD_FLAGS
            value: "--root=/storage"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
