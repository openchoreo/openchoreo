# Rootless image publish using Podman in a user namespace.
#
# Replaces publish-image-k3d.yaml (podman + privileged: true).
# Same podman load/tag/push flow, running as UID 1000 with overlay storage
# via hostUsers: false — no privileged mode, no elevated capabilities.
#
# Prerequisites:
#   - Kubernetes 1.33+ with UserNamespacesSupport (GA, enabled by default)
#   - containerd 2.x as container runtime
#
# Input: docker-archive tarball at /mnt/vol/app-image.tar
#
# Output: image reference written to /tmp/image.txt
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: publish-image-rootless
spec:
  templates:
    - name: publish-image
      podSpecPatch: '{"hostUsers": false}'
      inputs:
        parameters:
          - name: git-revision
      outputs:
        parameters:
          - name: image
            valueFrom:
              path: /tmp/image.txt
      volumes:
        - name: registry-push-secret
          secret:
            optional: true
            secretName: '{{workflow.parameters.registry-push-secret}}'
        - name: storage
          emptyDir:
            sizeLimit: 10Gi
      container:
        image: quay.io/podman/stable:v5.7.1
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            GIT_REVISION={{inputs.parameters.git-revision}}
            IMAGE_NAME={{workflow.parameters.image-name}}
            IMAGE_TAG={{workflow.parameters.image-tag}}
            SRC_IMAGE="${IMAGE_NAME}:${IMAGE_TAG}-${GIT_REVISION}"

            REGISTRY_ENDPOINT="host.k3d.internal:10082"
            DEST_IMAGE="${REGISTRY_ENDPOINT}/${SRC_IMAGE}"
            AUTH_FILE="/etc/secrets/registry-push-secret/.dockerconfigjson"

            export HOME=/tmp/podman-home
            export XDG_RUNTIME_DIR=/tmp/podman-run
            mkdir -p "$HOME" "$XDG_RUNTIME_DIR"
            chmod 700 "$XDG_RUNTIME_DIR"

            echo ">> [podman] Source image: $SRC_IMAGE"
            echo ">> Registry: $REGISTRY_ENDPOINT"
            echo ">> Destination: $DEST_IMAGE"
            echo ">> Authentication: $([ -f "$AUTH_FILE" ] && echo "registry secret found" || echo "no registry secret (anonymous push)")"

            LOAD_INPUT=/mnt/vol/app-image.tar
            if [ ! -f "$LOAD_INPUT" ]; then
              echo ">> Error: Built image tar not found at /mnt/vol/app-image.tar"
              echo ">> Hint: The build step may have failed to produce an image. Check the build step logs."
              exit 1
            fi
            echo ">> Using docker-archive image artifact: $LOAD_INPUT"

            # Configure overlay storage (user namespace provides the kernel support)
            mkdir -p /storage/run /storage/graph
            cat > /tmp/storage.conf <<'STORAGEEOF'
            [storage]
            driver = "overlay"
            runroot = "/storage/run"
            graphroot = "/storage/graph"
            rootless_storage_path = "/storage/graph"
            [storage.options]
            pull_options = {enable_partial_images = "true", use_hard_links = "false", ostree_repos=""}
            [storage.options.overlay]
            STORAGEEOF

            export CONTAINERS_STORAGE_CONF=/tmp/storage.conf

            podman load -i "$LOAD_INPUT"

            if ! podman tag "$SRC_IMAGE" "$DEST_IMAGE"; then
              echo ">> Source tag $SRC_IMAGE not found after load; tagging the loaded image ID"
              LOADED_IMAGE_ID="$(podman images --format '{{.ID}}' | head -n 1)"
              if [ -z "$LOADED_IMAGE_ID" ]; then
                echo ">> Error: No image was loaded from $LOAD_INPUT"
                exit 1
              fi
              podman tag "$LOADED_IMAGE_ID" "$DEST_IMAGE"
            fi

            echo ">> Pushing image to registry"
            if [ -f "$AUTH_FILE" ]; then
              podman push --tls-verify=false --authfile "$AUTH_FILE" "$DEST_IMAGE"
            else
              podman push --tls-verify=false "$DEST_IMAGE"
            fi

            echo ">> Image published successfully: $DEST_IMAGE"
            echo -n "$DEST_IMAGE" > /tmp/image.txt
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
          - mountPath: /storage
            name: storage
          - mountPath: /etc/secrets/registry-push-secret
            name: registry-push-secret
            readOnly: true
